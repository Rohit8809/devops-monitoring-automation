global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: "enterprise-servers"
    static_configs:
      - targets:
          - web-server:9100
          - app-server:9100
          - db-server:9100
          - monitoring-server:9100