services:

  flask:

    image: flask-alert-middleware:v1

    container_name: flask-container

    ports:
      - "5001:5000"

    restart: unless-stopped


  prometheus:

    image: prom/prometheus

    container_name: prometheus-container

    ports:
      - "9091:9090"

    volumes:
      - /opt/alert_middleware/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /opt/alert_middleware/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml

    restart: unless-stopped
