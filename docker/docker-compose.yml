services:

  flask:

    image: flask-alert-middleware:v1

    container_name: flask-container

    ports:
      - "5001:5000"

    restart: unless-stopped


  prometheus:

    image: prom/prometheus

    container_name: prometheus-container

    ports:
      - "9091:9090"

    volumes:
      - /opt/alert_middleware/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /opt/alert_middleware/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml

    restart: unless-stopped

  grafana:

    image: grafana/grafana

    container_name: grafana-container

    ports:
      - "3001:3000"

    restart: unless-stopped


  alertmanager:

    image: prom/alertmanager

    container_name: alertmanager-container

    ports:
      - "9095:9093"

    volumes:
      - /opt/alert_middleware/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

    restart: unless-stopped


